name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run ruff
        run: uv run ruff check src/ tests/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run mypy
        run: uv run mypy src/ --ignore-missing-imports --no-error-summary

  test:
    name: Testes (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      # PySide6 requires a display on Linux CI
      - name: Install virtual display (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 xvfb

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          uv run pytest tests/ -v --timeout=30 --ignore=tests/test_vault.py
        env:
          QT_QPA_PLATFORM: xcb

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: uv run pytest tests/ -v --timeout=30 --ignore=tests/test_vault.py
        env:
          QT_QPA_PLATFORM: offscreen

  build-check:
    name: Verificacao de Build (importar modulo)
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Verificar que o entrypoint importa sem erro
        run: uv run python -c "import workflow_app; print('OK')"
        env:
          QT_QPA_PLATFORM: offscreen

  security:
    name: Auditoria de Seguranca (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Auditar dependencias (pip-audit)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: .venv
          # Falha apenas em vulnerabilidades HIGH/CRITICAL
          # Ignorar avisos informativos sem CVE atribuido
          summary: true

  secrets-scan:
    name: Scan de Secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessario para scan de historico completo

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
